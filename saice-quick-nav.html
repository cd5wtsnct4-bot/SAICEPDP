<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAICE Quick Nav</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
.grid{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;padding:24px 24px}
.tile{display:flex;flex-direction:column;align-items:center;gap:12px;width:90px;text-decoration:none;cursor:pointer}
.ic{width:80px;height:80px;background:#194F9A;border-radius:50%;font-size:1.5rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.tile:hover .ic{background:#0A7EA4}
.lbl{font-size:.72rem;font-weight:600;color:#0D2B55;text-align:center;line-height:1.3}
/* responsive */
@media(max-width:640px){.grid{gap:20px;padding:20px 16px}}
@media(max-width:480px){.grid{gap:14px}.tile{width:74px;gap:8px}.ic{width:64px;height:64px;font-size:1.25rem}.lbl{font-size:.68rem}}
html,body{width:100%;max-width:100%}img,svg{max-width:100%}</style>
</head>
<body>
<div class="grid">
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/SitePages/Home.aspx" target="_parent"><div class="ic">🏠</div><span class="lbl">Home</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/Lists/Projects/Allitems.aspx" target="_parent"><div class="ic">📁</div><span class="lbl">Projects</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/SitePages/Training.aspx" target="_parent"><div class="ic">🎓</div><span class="lbl">Training</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/Lists/Events/calendar.aspx" target="_parent"><div class="ic">📅</div><span class="lbl">Events</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/SitePages/Knowledge-Hub.aspx" target="_parent"><div class="ic">📚</div><span class="lbl">Knowledge Hub</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/HR Policies/Forms/Allitems.aspx" target="_parent"><div class="ic">👥</div><span class="lbl">HR &amp; Staff</span></a>
  <a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDP/SitePages/Dashboards.aspx" target="_parent"><div class="ic">📊</div><span class="lbl">Dashboards</span></a>
<a class="tile" href="https://allysaice.sharepoint.com/sites/SAICEPDPHelpDesk/SitePages/ITHelpdeskHome.aspx" target="_parent"><div class="ic">❓</div><span class="lbl">Help Desk</span></a>
</div>

<script>
/* SharePoint Embed auto-height: resizes the hosting iframe so stacked
   mobile layouts are never clipped. Works because the embed is served
   from the same SharePoint origin; silently no-ops otherwise. */
(function(){
  function fit(){
    var h = document.documentElement.scrollHeight;
    /* same-origin path (no-op when hosted on GitHub) */
    try{
      var fe = window.frameElement;
      if(fe){ fe.style.width='100%'; fe.style.maxWidth='100%'; fe.style.height=h+'px'; }
    }catch(e){}
    /* cross-origin path: notify the SharePoint page; requires a listener
       (SPFx application customizer or script editor) on the parent page */
    try{
      if(window.parent && window.parent !== window){
        window.parent.postMessage({type:'saice-widget-resize', href:location.href, height:h}, '*');
      }
    }catch(e){}
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
  if (window.ResizeObserver) { new ResizeObserver(fit).observe(document.body); }
  else { setInterval(fit, 800); }
})();
</script>
</body>
</html>
