<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAICE Stats</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:transparent;overflow-x:hidden}
.wrap{display:flex;gap:40px;justify-content:center;align-items:center;background:linear-gradient(120deg,#0D2B55,#0A7EA4);padding:20px 32px}
.stat{text-align:center}
.num{font-size:2.2rem;font-weight:800;color:#E8640A;line-height:1}
.lbl{font-size:.7rem;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.6px;margin-top:5px}
/* responsive */
@media(max-width:560px){.wrap{gap:24px;padding:16px 20px;flex-wrap:wrap}.num{font-size:1.7rem}}
@media(max-width:340px){.wrap{gap:14px}}
html,body{width:100%;max-width:100%}img,svg{max-width:100%}</style>
</head>
<body>
<div class="wrap">
  <div class="stat"><div class="num">48</div><div class="lbl">Active Projects</div></div>
  <div class="stat"><div class="num">12</div><div class="lbl">Upcoming Events</div></div>
  <div class="stat"><div class="num">320</div><div class="lbl">Team Members</div></div>
</div>

<script>
/* SharePoint Embed auto-height: resizes the hosting iframe so stacked
   mobile layouts are never clipped. Works because the embed is served
   from the same SharePoint origin; silently no-ops otherwise. */
(function(){
  function fit(){
    var h = document.documentElement.scrollHeight;
    /* same-origin path (no-op when hosted on GitHub) */
    try{
      var fe = window.frameElement;
      if(fe){ fe.style.width='100%'; fe.style.maxWidth='100%'; fe.style.height=h+'px'; }
    }catch(e){}
    /* cross-origin path: notify the SharePoint page; requires a listener
       (SPFx application customizer or script editor) on the parent page */
    try{
      if(window.parent && window.parent !== window){
        window.parent.postMessage({type:'saice-widget-resize', href:location.href, height:h}, '*');
      }
    }catch(e){}
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
  if (window.ResizeObserver) { new ResizeObserver(fit).observe(document.body); }
  else { setInterval(fit, 800); }
})();
</script>
</body>
</html>
